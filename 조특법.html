<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조특법 통합 분석 솔루션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .tag-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; transform: scale(1.05); }
        .group-container { background: white; border: 2px solid #e2e8f0; border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .spec-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #e2e8f0; border-radius: 8px; overflow: hidden; margin-top: 15px; border: 1px solid #e2e8f0; }
        .spec-item { background: #f8fafc; padding: 8px 4px; text-align: center; }
        .spec-label { font-size: 10px; color: #94a3b8; font-weight: 800; margin-bottom: 2px; }
        .spec-value { font-size: 11px; color: #1e293b; font-weight: 700; }
        .conflict-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; font-weight: 700; }
    </style>
</head>
<body class="py-6 md:py-10">

<div class="max-w-7xl mx-auto px-4">
    <header class="mb-10 text-center md:text-left">
        <h1 class="text-3xl font-black text-slate-900 tracking-tight flex items-center gap-3">
            <span class="bg-indigo-600 text-white p-2 rounded-xl text-xl">TAX</span> 조세특례·고용지원 통합 분석
        </h1>
        <p class="text-slate-500 mt-2 font-medium">여러 키워드를 선택해 보세요. 중복배제 그룹을 자동으로 분석합니다.</p>
    </header>

    <div class="flex flex-col md:flex-row gap-8">
        <!-- 왼쪽: 상황 키워드 (사이드바) -->
        <aside class="w-full md:w-72 flex-shrink-0">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-5">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">상황 키워드</h2>
                    <button onclick="resetTags()" class="text-xs text-indigo-600 font-bold hover:underline">초기화</button>
                </div>
                <div id="tag-container" class="flex flex-wrap md:flex-col gap-2">
                    <!-- 버튼 생성 위치 -->
                </div>
            </div>
        </aside>

        <!-- 오른쪽: 결과 영역 -->
        <main class="flex-1">
            <div id="loading" class="text-center py-20 font-bold text-slate-400 animate-pulse">데이터를 불러오는 중...</div>
            
            <div id="main-content" class="hidden">
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="text-xl font-bold">매칭 결과 <span id="match-count" class="text-indigo-600">0</span>건</h2>
                </div>
                <div id="result-area" class="space-y-6">
                    <!-- 결과 카드 삽입 위치 -->
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxosuJSvfkc-RwP1V8gYTTwTDrugOINAsJ-P43auIP2d8yFnkhdEC7yxx_Xh5YHFpevqg/exec";
    let taxDB = [];
    let selectedTags = new Set();

    // 중복 그룹 코드 설명 매핑
    const groupMap = {
        'G2': '제127조 제2항 그룹 (투자세액공제 중복금지)',
        'G3': '제127조 제3항 그룹 (세액공제와 외국인투자)',
        'G4': '제127조 제4항 그룹 (세액감면 vs 세액공제)',
        'G5': '제127조 제5항 그룹 (세액감면중복배제)',
        'COMMON': '중복 적용 가능 항목'
    };

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // 데이터 가공
            taxDB = data.map(item => ({
                ...item,
                tags: item.tags ? item.tags.toString().split(',').map(t => t.trim()) : [],
                // exclusion_codes를 ["G2", "G3"] 형태로 배열화
                exclusion_codes: item.exclusion_codes ? item.exclusion_codes.toString().split(',').map(c => c.trim()) : ['NONE']
            }));
            initUI();
        } catch (e) { document.getElementById('loading').innerText = "데이터 로드 실패"; }
    }

    function initUI() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        
        const allTags = [...new Set(taxDB.flatMap(d => d.tags))].filter(t => t).sort();
        const container = document.getElementById('tag-container');
        
        allTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.innerText = tag;
            btn.className = "tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 text-left hover:border-indigo-300 transition-all";
            btn.onclick = () => {
                btn.classList.toggle('active');
                selectedTags.has(tag) ? selectedTags.delete(tag) : selectedTags.add(tag);
                updateResults();
            };
            container.appendChild(btn);
        });
    }

    function updateResults() {
        const listArea = document.getElementById('result-area');
        if (selectedTags.size === 0) {
            listArea.innerHTML = `<div class="bg-white p-20 rounded-3xl text-center border-2 border-dashed border-slate-200 text-slate-400 font-bold italic text-lg">필터를 선택해 주세요.</div>`;
            return;
        }

        // 1. 교집합(some/includes) 기반 필터링 및 매칭 점수 계산
        let matched = taxDB.map(item => {
            const score = item.tags.filter(t => selectedTags.has(t)).length;
            return { ...item, score };
        }).filter(item => item.score > 0).sort((a, b) => b.score - a.score);

        document.getElementById('match-count').innerText = matched.length;

        // 2. 그룹핑 로직 (다중 그룹 대응)
        // 여기서는 가독성을 위해 가장 먼저 매칭된 그룹 코드를 기준으로 1차 분류합니다.
        const groups = matched.reduce((acc, item) => {
            const primaryGroup = item.exclusion_codes[0] === 'NONE' ? 'COMMON' : item.exclusion_codes[0];
            if (!acc[primaryGroup]) acc[primaryGroup] = [];
            acc[primaryGroup].push(item);
            return acc;
        }, {});

        // 3. 렌더링
        listArea.innerHTML = "";
        for (const gCode in groups) {
            const groupWrapper = document.createElement('div');
            groupWrapper.className = gCode !== 'COMMON' ? "group-container" : "";
            
            if (gCode !== 'COMMON') {
                groupWrapper.innerHTML = `<div class="mb-4 flex items-center gap-2"><span class="bg-orange-500 text-white text-[10px] font-black px-2 py-1 rounded">중복배제</span> <h4 class="text-sm font-bold text-slate-700">${groupMap[gCode] || gCode}</h4></div>`;
            }

            groups[gCode].forEach(item => {
                const card = `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-4 relative overflow-hidden">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex gap-2 items-center">
                                <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">${item.article}</span>
                                ${item.exclusion_codes.map(c => c !== 'NONE' ? `<span class="conflict-badge">${c}</span>` : '').join('')}
                            </div>
                            <h3 class="text-xl font-extrabold text-slate-800 mt-2">${item.title}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-rose-400 uppercase">혜택</p>
                            <p class="text-2xl font-black text-rose-600 leading-none">${item.benefit}</p>
                        </div>
                    </div>

                    <p class="text-sm text-slate-500 leading-relaxed font-medium mb-4">${item.reqs}</p>

                    <!-- 4대 필수 지표 정보창 -->
                    <div class="spec-box">
                        <div class="spec-item"><p class="spec-label">최저한세</p><p class="spec-value">${item.min_tax}</p></div>
                        <div class="spec-item"><p class="spec-label">농특세</p><p class="spec-value">${item.agri_tax}</p></div>
                        <div class="spec-item"><p class="spec-label">감가상각의제</p><p class="spec-value">${item.deemed_depr}</p></div>
                        <div class="spec-item"><p class="spec-label">이월공제</p><p class="spec-value">${item.carry_over}</p></div>
                    </div>
                </div>`;
                groupWrapper.insertAdjacentHTML('beforeend', card);
            });
            listArea.appendChild(groupWrapper);
        }
    }

    function resetTags() {
        selectedTags.clear();
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        updateResults();
    }

    loadData();
</script>
</body>
</html>
